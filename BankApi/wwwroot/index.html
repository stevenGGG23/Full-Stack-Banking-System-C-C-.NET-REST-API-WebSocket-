<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Open Bank</title>
<link rel="icon" href="/logo.png" />
<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8/dist/browser/signalr.min.js"></script>
<style>
  :root {
    --navy: #0b2545;
    --navy-dark: #071a33;
    --teal: #1b998b;
    --teal-dark: #157c70;
    --bg: #f2f5f8;
    --card: #ffffff;
    --border: #e1e7ed;
    --text: #1c2b3a;
    --muted: #6b7c8c;
    --red: #c0392b;
    --green: #1b998b;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(15, 35, 60, 0.08), 0 1px 2px rgba(15, 35, 60, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
  }

  .topbar {
    background: var(--navy);
    color: #fff;
    padding: 0.9rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
  }

  .brand { display: flex; align-items: center; }

  .brand-logo { height: 24px; width: auto; display: block; background: #fff; padding: 4px 8px; border-radius: 6px; }

  #userBar { display: flex; align-items: center; gap: 0.9rem; font-size: 0.9rem; }
  #userBar .welcome { opacity: 0.85; }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  .hidden { display: none !important; }

  /* ---- Auth screen ---- */
  .auth-wrap {
    display: flex;
    justify-content: center;
    padding-top: 3rem;
  }

  .auth-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 380px;
    overflow: hidden;
  }

  .tabs { display: flex; border-bottom: 1px solid var(--border); }

  .tab {
    flex: 1;
    padding: 0.9rem;
    background: none;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }

  .tab.active { color: var(--navy); border-bottom-color: var(--teal); }

  .auth-form { padding: 1.5rem; }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 0.3rem;
    margin-top: 0.9rem;
  }

  label:first-child { margin-top: 0; }

  input, select {
    width: 100%;
    padding: 0.55rem 0.7rem;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text);
  }

  input:focus, select:focus { outline: 2px solid var(--teal); outline-offset: 1px; }

  button {
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    padding: 0.55rem 1rem;
  }

  button.primary { background: var(--teal); color: #fff; }
  button.primary:hover { background: var(--teal-dark); }
  button.ghost { background: transparent; color: var(--navy); border: 1px solid var(--border); }
  button.ghost:hover { background: var(--bg); }
  button.small { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
  button.full { width: 100%; margin-top: 1.1rem; }

  .error { color: var(--red); font-size: 0.85rem; margin: 0.5rem 0 0; min-height: 1em; }

  /* ---- Dashboard ---- */
  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
  }

  .dashboard-header h2 { font-size: 1.1rem; color: var(--navy); margin: 0; }

  .accounts-grid {
    display: grid;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .account-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.2rem 1.3rem;
  }

  .account-card-top {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.3rem;
  }

  .account-balance {
    font-size: 2rem;
    font-weight: 700;
    color: var(--navy);
    padding: 0.1rem 0.2rem;
    border-radius: 6px;
    display: inline-block;
  }

  @keyframes flash-green {
    0% { background-color: rgba(27, 153, 139, 0.28); }
    100% { background-color: transparent; }
  }
  .flash { animation: flash-green 1.4s ease-out; }

  .account-actions { display: flex; gap: 0.5rem; margin-top: 0.9rem; flex-wrap: wrap; }

  .inline-form { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
  .inline-form input { flex: 1; }

  .muted { color: var(--muted); font-size: 0.85rem; }

  .history { margin-top: 0.8rem; max-height: 220px; overflow-y: auto; }

  .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .history-table th, .history-table td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .history-table th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; }

  .admin-scroll { max-height: 320px; overflow: auto; }

  .new-account-row { display: flex; gap: 0.5rem; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.2rem 1.3rem;
  }

  .card h3 { margin: 0 0 0.9rem; font-size: 1rem; color: var(--navy); }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 0.7rem;
    align-items: end;
  }

  .field label { margin-top: 0; }

  @media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><img src="/logo.png" alt="Open Bank" class="brand-logo" /></div>
  <div id="userBar" class="hidden">
    <span class="welcome" id="welcomeUser"></span>
    <button class="ghost small hidden" id="adminNavBtn" onclick="showAdminPanel()">Admin</button>
    <button class="ghost small" onclick="logout()">Log out</button>
  </div>
</div>

<main>
  <div id="authScreen" class="auth-wrap">
    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="showTab('login')">Log In</button>
        <button class="tab" id="tabRegister" onclick="showTab('register')">Register</button>
      </div>

      <div id="loginForm" class="auth-form">
        <label>Username</label>
        <input id="loginUsername" autocomplete="username" />
        <label>Password</label>
        <input id="loginPassword" type="password" autocomplete="current-password" />
        <button class="primary full" onclick="login()">Log In</button>
        <p id="authError" class="error"></p>
      </div>

      <div id="registerForm" class="auth-form hidden">
        <label>Username</label>
        <input id="regUsername" autocomplete="username" />
        <label>Email</label>
        <input id="regEmail" autocomplete="email" />
        <label>Password</label>
        <input id="regPassword" type="password" autocomplete="new-password" />
        <button class="primary full" onclick="register()">Create Account</button>
        <p id="regError" class="error"></p>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="dashboard-header">
      <h2>Your Accounts</h2>
      <div class="new-account-row">
        <select id="newAccountType">
          <option value="checking">Checking</option>
          <option value="savings">Savings</option>
        </select>
        <button class="ghost small" onclick="openAccount()">+ Open new account</button>
      </div>
    </div>
    <div id="accounts" class="accounts-grid"></div>

    <div class="card">
      <h3>Transfer money</h3>
      <div class="form-grid">
        <div class="field">
          <label>From</label>
          <select id="transferFrom"></select>
        </div>
        <div class="field">
          <label>To account #</label>
          <input id="transferTo" placeholder="e.g. 7" />
        </div>
        <div class="field">
          <label>Amount</label>
          <input id="transferAmount" placeholder="0.00" />
        </div>
        <button class="primary" onclick="transfer()">Send</button>
      </div>
      <p id="transferError" class="error"></p>
    </div>
  </div>

  <div id="adminPanel" class="hidden">
    <div class="dashboard-header">
      <h2>Admin</h2>
      <div class="new-account-row">
        <button class="ghost small" onclick="accrueInterest()">Accrue Interest</button>
        <button class="ghost small" onclick="showDashboard()">Back to Dashboard</button>
      </div>
    </div>
    <p id="accrueResult" class="muted"></p>

    <div class="card">
      <h3>Users</h3>
      <div id="adminUsers" class="admin-scroll"></div>
    </div>
    <div class="card">
      <h3>All Accounts</h3>
      <div id="adminAccounts" class="admin-scroll"></div>
    </div>
    <div class="card">
      <h3>All Transactions (latest 200)</h3>
      <div id="adminTransactions" class="admin-scroll"></div>
    </div>
  </div>
</main>

<script>
let token = sessionStorage.getItem('token');
let accounts = [];
let connection = null;

function api(path, method, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined })
    .then(async res => {
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || res.statusText);
      return data;
    });
}

function field(id) {
  return document.getElementById(id).value;
}

function showTab(which) {
  document.getElementById('tabLogin').classList.toggle('active', which === 'login');
  document.getElementById('tabRegister').classList.toggle('active', which === 'register');
  document.getElementById('loginForm').classList.toggle('hidden', which !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', which !== 'register');
}

async function login() {
  await authenticate('/api/auth/login', { username: field('loginUsername'), password: field('loginPassword') }, 'authError');
}

async function register() {
  await authenticate('/api/auth/register', { username: field('regUsername'), email: field('regEmail'), password: field('regPassword') }, 'regError');
}

async function authenticate(path, body, errorElId) {
  document.getElementById(errorElId).textContent = '';
  try {
    const data = await api(path, 'POST', body);
    token = data.token;
    sessionStorage.setItem('token', token);
    await enterDashboard(body.username);
  } catch (err) {
    document.getElementById(errorElId).textContent = err.message;
  }
}

function logout() {
  if (connection) connection.stop();
  sessionStorage.removeItem('token');
  token = null;
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('userBar').classList.add('hidden');
}

function decodeJwtRole(t) {
  try {
    const payload = JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    return payload.role;
  } catch {
    return null;
  }
}

async function enterDashboard(username) {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('userBar').classList.remove('hidden');
  if (username) document.getElementById('welcomeUser').textContent = `Signed in as ${username}`;
  document.getElementById('adminNavBtn').classList.toggle('hidden', decodeJwtRole(token) !== 'admin');
  await refreshAccounts();
  await connectHub();
}

async function refreshAccounts() {
  accounts = await api('/api/accounts', 'GET');
  renderAccounts();
}

function renderAccounts() {
  const container = document.getElementById('accounts');
  container.innerHTML = '';
  const fromSelect = document.getElementById('transferFrom');
  fromSelect.innerHTML = '';

  for (const acct of accounts) {
    const card = document.createElement('div');
    card.className = 'account-card';
    card.id = `account-${acct.accountId}`;
    card.innerHTML = `
      <div class="account-card-top">
        <span>${acct.accountType}</span>
        <span>Account #${acct.accountId}</span>
      </div>
      <div class="account-balance" id="balance-${acct.accountId}">$${acct.balance.toFixed(2)}</div>
      <div class="account-actions">
        <button class="ghost small" onclick="toggleForm(${acct.accountId}, 'deposit')">Deposit</button>
        <button class="ghost small" onclick="toggleForm(${acct.accountId}, 'withdraw')">Withdraw</button>
        <button class="ghost small" onclick="toggleHistory(${acct.accountId})">History</button>
        <button class="ghost small" onclick="downloadStatement(${acct.accountId})">Statement</button>
      </div>
      <div class="inline-form hidden" id="form-${acct.accountId}">
        <input id="amt-${acct.accountId}" placeholder="Amount" />
        <button class="primary small" id="formAction-${acct.accountId}">Confirm</button>
      </div>
      <div class="history hidden" id="history-${acct.accountId}"></div>
      <p id="error-${acct.accountId}" class="error"></p>
    `;
    container.appendChild(card);

    const option = document.createElement('option');
    option.value = acct.accountId;
    option.textContent = `#${acct.accountId} (${acct.accountType})`;
    fromSelect.appendChild(option);
  }
}

function toggleForm(accountId, type) {
  const formEl = document.getElementById(`form-${accountId}`);
  const alreadyOpenForSameType = !formEl.classList.contains('hidden') && formEl.dataset.type === type;

  if (alreadyOpenForSameType) {
    formEl.classList.add('hidden');
    return;
  }

  formEl.dataset.type = type;
  formEl.classList.remove('hidden');
  const actionBtn = document.getElementById(`formAction-${accountId}`);
  actionBtn.textContent = type === 'deposit' ? 'Confirm Deposit' : 'Confirm Withdraw';
  actionBtn.onclick = () => submitForm(accountId);
  document.getElementById(`amt-${accountId}`).focus();
}

async function submitForm(accountId) {
  const formEl = document.getElementById(`form-${accountId}`);
  const type = formEl.dataset.type;
  const amount = parseFloat(field(`amt-${accountId}`));
  const path = type === 'deposit' ? '/api/transactions/deposit' : '/api/transactions/withdraw';
  const errorEl = document.getElementById(`error-${accountId}`);
  errorEl.textContent = '';
  try {
    await api(path, 'POST', { accountId, amount });
    formEl.classList.add('hidden');
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

async function transfer() {
  const errorEl = document.getElementById('transferError');
  errorEl.textContent = '';
  try {
    await api('/api/transactions/transfer', 'POST', {
      fromAccountId: parseInt(field('transferFrom')),
      toAccountId: parseInt(field('transferTo')),
      amount: parseFloat(field('transferAmount')),
    });
  } catch (err) {
    errorEl.textContent = err.message;
  }
}

async function openAccount() {
  const acct = await api('/api/accounts', 'POST', { accountType: field('newAccountType') });
  accounts.push(acct);
  renderAccounts();
  if (connection) await connection.invoke('SubscribeToAccount', acct.accountId);
}

async function toggleHistory(accountId) {
  const el = document.getElementById(`history-${accountId}`);
  if (!el.classList.contains('hidden')) {
    el.classList.add('hidden');
    return;
  }
  el.classList.remove('hidden');
  el.innerHTML = '<p class="muted">Loading...</p>';
  try {
    const txns = await api(`/api/accounts/${accountId}/transactions`, 'GET');
    if (!txns.length) {
      el.innerHTML = '<p class="muted">No transactions yet.</p>';
      return;
    }
    const rows = txns.map(t => `
      <tr>
        <td>${new Date(t.createdAt).toLocaleString()}</td>
        <td>${t.transactionType}</td>
        <td>$${t.amount.toFixed(2)}</td>
        <td>$${t.fee.toFixed(2)}</td>
      </tr>`).join('');
    el.innerHTML = `<table class="history-table"><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Fee</th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch (err) {
    el.innerHTML = `<p class="error">${err.message}</p>`;
  }
}

async function downloadStatement(accountId) {
  // A plain <a href> download link can't attach the Authorization header this
  // API requires, so fetch the CSV ourselves and trigger the download from a blob.
  const res = await fetch(`/api/accounts/${accountId}/statement`, {
    headers: { Authorization: 'Bearer ' + token },
  });
  if (!res.ok) {
    alert('Could not download statement');
    return;
  }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `statement-account-${accountId}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function showDashboard() {
  document.getElementById('adminPanel').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
}

async function showAdminPanel() {
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('adminPanel').classList.remove('hidden');
  document.getElementById('accrueResult').textContent = '';
  await loadAdminData();
}

const MONEY_COLUMNS = new Set(['balance', 'amount', 'fee']);
const DATE_COLUMNS = new Set(['createdAt']);

function formatCell(column, value) {
  if (MONEY_COLUMNS.has(column)) return `$${value.toFixed(2)}`;
  if (DATE_COLUMNS.has(column)) return new Date(value).toLocaleString();
  return value;
}

function renderAdminTable(containerId, columns, rows) {
  const container = document.getElementById(containerId);
  if (!rows.length) {
    container.innerHTML = '<p class="muted">None.</p>';
    return;
  }
  const header = columns.map(c => `<th>${c}</th>`).join('');
  const body = rows.map(r => `<tr>${columns.map(c => `<td>${formatCell(c, r[c])}</td>`).join('')}</tr>`).join('');
  container.innerHTML = `<table class="history-table"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
}

async function loadAdminData() {
  const [users, accts, txns] = await Promise.all([
    api('/api/admin/users', 'GET'),
    api('/api/admin/accounts', 'GET'),
    api('/api/admin/transactions', 'GET'),
  ]);
  renderAdminTable('adminUsers', ['userId', 'username', 'email', 'role', 'createdAt'], users);
  renderAdminTable('adminAccounts', ['accountId', 'userId', 'username', 'accountType', 'balance'], accts);
  renderAdminTable('adminTransactions', ['transactionId', 'accountId', 'transactionType', 'amount', 'fee', 'createdAt'], txns);
}

async function accrueInterest() {
  const resultEl = document.getElementById('accrueResult');
  resultEl.textContent = 'Processing...';
  try {
    const result = await api('/api/admin/accrue-interest', 'POST');
    resultEl.textContent = `Applied interest to ${result.accountsProcessed} account(s).`;
    await loadAdminData();
  } catch (err) {
    resultEl.textContent = err.message;
  }
}

function flashBalance(accountId, balance) {
  const el = document.getElementById(`balance-${accountId}`);
  if (!el) return;
  el.textContent = `$${balance.toFixed(2)}`;
  el.classList.remove('flash');
  void el.offsetWidth; // restart the animation
  el.classList.add('flash');
}

async function connectHub() {
  connection = new signalR.HubConnectionBuilder()
    .withUrl('/hubs/accounts', { accessTokenFactory: () => token })
    .withAutomaticReconnect()
    .build();

  connection.on('BalanceUpdated', ({ accountId, balance }) => flashBalance(accountId, balance));

  await connection.start();
  for (const acct of accounts) {
    await connection.invoke('SubscribeToAccount', acct.accountId);
  }
}

if (token) enterDashboard().catch(logout);
</script>

</body>
</html>
